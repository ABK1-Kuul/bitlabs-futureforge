name: Build for cPanel

# Builds on GitHub's runners (plenty of RAM) and publishes a deploy-only branch
# that cPanel can pull without running vite build on shared hosting.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci
      - run: NODE_ENV=production npm run build

      - name: Publish cpanel-deploy branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          DEPLOY_DIR=$(mktemp -d)
          cp package.json package-lock.json app.js .cpanel.yml "$DEPLOY_DIR/"
          cp -R dist "$DEPLOY_DIR/dist"

          cd "$DEPLOY_DIR"
          git init -q
          git checkout -q -b cpanel-deploy
          git add .
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -m "Deploy build ${GITHUB_SHA::7}"

          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:cpanel-deploy
