name: Build for cPanel

# Builds on GitHub's runners (plenty of RAM) and publishes a deploy-only branch
# that cPanel can pull without running vite build on shared hosting.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci
      - run: NODE_ENV=production npm run build

      - name: Publish cpanel-deploy branch
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Branch from main (shared history) so cPanel can switch branches normally.
          git checkout -B cpanel-deploy

          # Replace the tree with deploy-only files (no vite build needed on server).
          git rm -rf --quiet --ignore-unmatch .
          git add -f dist package.json package-lock.json app.js .cpanel.yml
          git commit -m "Deploy build ${GITHUB_SHA::7}"

          git push -f origin cpanel-deploy
